<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>词卡 · 托福 + SSAT</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="词卡">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f1e8">
<style>
  :root{
    --ink:#1c2a3a; --ink-soft:#42566b; --paper:#f5f1e8; --card:#fffdf8;
    --line:#d9d2c2; --amber:#c98a2b; --amber-deep:#a86f1c; --clay:#b25a44;
    --clay-soft:#cf7d68; --teal:#2f6f6a; --gold:#d9a441;
    --shadow:0 10px 30px -12px rgba(28,42,58,.35); --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 14px 28px;}
  .wrap{width:100%;max-width:470px;display:flex;flex-direction:column;gap:13px;}
  .display{font-family:Georgia,"Times New Roman",serif;}

  /* header w/ gamification */
  header{display:flex;justify-content:space-between;align-items:center;}
  .logo{font-family:Georgia,serif;font-size:21px;font-weight:700;letter-spacing:.5px;}
  .logo .dot{color:var(--clay);}
  .gamebar{display:flex;gap:8px;align-items:center;}
  .pill{display:flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;
    background:var(--card);border:1px solid var(--line);border-radius:20px;padding:5px 10px;
    font-variant-numeric:tabular-nums;}
  .pill .ic{font-size:13px;}
  .pill.streak{color:var(--clay);}
  .pill.xp{color:var(--amber-deep);}
  .tbtn{border:1px solid var(--line);background:var(--card);border-radius:9px;width:32px;height:30px;
    font-size:14px;cursor:pointer;padding:0;line-height:1;}
  .tbtn:active{background:#eee6d4;}
  .adv-row{margin-bottom:9px;}
  .adv-toggle{border:none;background:transparent;color:var(--ink-soft);font-size:11.5px;cursor:pointer;
    font-family:inherit;padding:2px 0;text-decoration:underline;}
  .adv-seg{margin-top:7px;}
  .modal-bg{position:fixed;inset:0;background:rgba(28,42,58,.45);display:none;z-index:100;
    align-items:flex-start;justify-content:center;padding:40px 14px;overflow-y:auto;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--paper);border-radius:20px;max-width:440px;width:100%;padding:22px 20px 24px;
    box-shadow:0 20px 50px -15px rgba(28,42,58,.5);max-height:86vh;overflow-y:auto;}
  .modal h3{font-family:Georgia,serif;font-size:20px;margin:0 0 16px;color:var(--ink);
    display:flex;justify-content:space-between;align-items:center;}
  .modal h3 .x{border:none;background:transparent;font-size:20px;cursor:pointer;color:var(--ink-soft);}
  .mrow{margin-bottom:18px;}
  .mrow .ml{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px;display:flex;justify-content:space-between;}
  .mrow .ml .mv{color:var(--clay);font-variant-numeric:tabular-nums;}
  .mrow input[type=range]{width:100%;accent-color:var(--clay);}
  .mhint{font-size:11.5px;color:var(--ink-soft);line-height:1.5;margin-top:4px;}
  .mbtn{display:block;width:100%;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;
    cursor:pointer;font-family:inherit;margin-top:10px;background:var(--teal);color:#fff;}
  .mbtn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);}
  .mbtn.warn{background:#fff;color:var(--clay);border:1.5px solid var(--clay-soft);}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;}
  .stat-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center;}
  .stat-box .bn{font-family:Georgia,serif;font-size:26px;font-weight:700;color:var(--ink);}
  .stat-box .bl{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .backup-area{width:100%;height:70px;font-size:10px;font-family:monospace;border:1px solid var(--line);
    border-radius:10px;padding:8px;resize:none;background:var(--card);color:var(--ink-soft);}
  .starlist{max-height:300px;overflow-y:auto;}
  .star-item{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--line);}
  .star-item .sw{font-family:Georgia,serif;font-weight:700;font-size:16px;color:var(--ink);}
  .star-item .sd{font-size:12px;color:var(--ink-soft);}
  .star-item button{border:none;background:transparent;cursor:pointer;font-size:16px;}
  .card-star{position:absolute;bottom:13px;right:14px;border:none;background:transparent;font-size:18px;
    cursor:pointer;opacity:.5;}
  .card-star.on{opacity:1;}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:11px 11px 13px;box-shadow:var(--shadow);}
  .ctl-row{display:flex;gap:7px;margin-bottom:9px;}
  .ctl-row:last-child{margin-bottom:0;}
  .ctl-label{font-size:11px;color:var(--ink-soft);width:42px;flex:none;align-self:center;letter-spacing:.5px;}
  .seg{flex:1;display:flex;background:var(--paper);border-radius:11px;padding:3px;gap:3px;}
  .seg button{flex:1;border:none;background:transparent;color:var(--ink-soft);
    font-size:12px;padding:7px 3px;border-radius:8px;cursor:pointer;font-weight:600;
    transition:.15s;font-family:inherit;white-space:nowrap;}
  .seg button.on{background:var(--ink);color:#fff;}
  .seg.teal button.on{background:var(--teal);}
  .seg.clay button.on{background:var(--clay);}

  /* daily goal bar */
  .goal{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--ink-soft);}
  .goal2{display:flex;flex-direction:column;gap:7px;}
  .due-line{font-size:11.5px;color:var(--clay);font-weight:600;margin-bottom:7px;text-align:center;}
  .due-line .z{color:var(--ink-soft);font-weight:500;}
  .goal-item{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-soft);}
  .goal-item .gl{font-size:10px;font-weight:700;letter-spacing:.5px;width:38px;flex:none;
    padding:2px 0;text-align:center;border-radius:5px;}
  .gl-new{background:rgba(201,138,43,.16);color:var(--amber-deep);}
  .gl-rev{background:rgba(47,111,106,.13);color:var(--teal);}
  .goal .bar{flex:1;height:8px;background:#e7e0d0;border-radius:5px;overflow:hidden;}
  .goal .bar > i{display:block;height:100%;width:0;border-radius:5px;
    background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .5s;}
  .goal .num{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}

  /* card */
  .stage{perspective:1500px;}
  .card{position:relative;width:100%;min-height:300px;cursor:pointer;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.2,1);}
  .card.flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px;text-align:center;}
  .face.back{transform:rotateY(180deg);}
  .tier-chip{position:absolute;top:13px;left:15px;font-size:10px;letter-spacing:.6px;font-weight:700;
    text-transform:uppercase;padding:3px 9px;border-radius:20px;}
  .tier-toefl{background:rgba(47,111,106,.12);color:var(--teal);}
  .tier-ssat{background:rgba(178,90,68,.13);color:var(--clay);}
  .pos{position:absolute;top:13px;right:46px;font-size:12px;color:var(--ink-soft);font-style:italic;}
  .rv-chip{position:absolute;top:13px;left:78px;font-size:10px;font-weight:700;letter-spacing:.5px;
    padding:3px 8px;border-radius:20px;}
  .rv-old{background:rgba(47,111,106,.12);color:var(--teal);}
  .rv-new{background:rgba(201,138,43,.16);color:var(--amber-deep);}
  .spk{position:absolute;top:10px;right:12px;width:30px;height:30px;border-radius:50%;
    border:1px solid var(--line);background:var(--paper);cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;color:var(--teal);}
  .spk:active{background:#eee6d4;}
  .word{font-family:Georgia,serif;font-size:38px;font-weight:700;line-height:1.12;color:var(--ink);word-break:break-word;}
  .word-zh{font-size:27px;font-weight:600;color:var(--ink);line-height:1.3;}
  .phon{margin-top:7px;font-size:14px;color:var(--ink-soft);font-style:italic;}
  .hint{position:absolute;bottom:15px;font-size:11.5px;color:#b3aa97;letter-spacing:.4px;}
  .answer-zh{font-size:24px;font-weight:600;color:var(--ink);line-height:1.4;}
  .answer-en{font-family:Georgia,serif;font-size:32px;font-weight:700;color:var(--ink);}
  .def-en{font-size:16px;color:var(--ink);line-height:1.45;max-width:330px;}
  .meta{margin-top:13px;font-size:13px;line-height:1.6;max-width:340px;text-align:left;}
  .meta-ssat{background:rgba(178,90,68,.05);border:1px solid rgba(178,90,68,.18);
    border-radius:12px;padding:11px 14px;margin-top:15px;text-align:left;}
  .meta .row{margin:3px 0;}
  .meta .lab{font-weight:700;font-size:11px;letter-spacing:.5px;padding:1px 6px;border-radius:5px;margin-right:5px;}
  .lab-root{background:rgba(201,138,43,.16);color:var(--amber-deep);}
  .lab-syn{background:rgba(47,111,106,.14);color:var(--teal);}
  .lab-ant{background:rgba(178,90,68,.14);color:var(--clay);}
  .ex{margin-top:13px;font-size:13.5px;color:var(--ink-soft);line-height:1.55;max-width:340px;
    text-align:left;background:rgba(47,111,106,.045);border-left:3px solid rgba(47,111,106,.35);
    border-radius:0 8px 8px 0;padding:9px 12px;position:relative;}
  .ex .ex-q{display:inline-block;font-size:10px;font-weight:700;color:var(--teal);letter-spacing:1px;
    background:rgba(47,111,106,.12);border-radius:4px;padding:1px 5px;margin-right:6px;vertical-align:1px;}
  .ex mark{background:rgba(201,138,43,.28);color:var(--amber-deep);font-weight:700;
    border-radius:3px;padding:0 2px;font-style:normal;}
  .ex b{color:var(--clay);font-style:normal;font-weight:700;}
  .ex .spk-mini,.def-spk{display:inline-flex;width:22px;height:22px;border-radius:50%;border:1px solid var(--line);
    background:var(--paper);cursor:pointer;font-size:11px;align-items:center;justify-content:center;
    color:var(--teal);vertical-align:middle;margin-left:5px;font-style:normal;}

  /* spelling */
  .dict-big{width:72px;height:72px;border-radius:50%;border:2px solid var(--teal);background:rgba(47,111,106,.08);
    color:var(--teal);font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .dict-big:active{background:rgba(47,111,106,.18);}
  .spell-input{font-family:Georgia,serif;font-size:25px;text-align:center;width:100%;max-width:300px;
    border:none;border-bottom:2.5px solid var(--line);background:transparent;color:var(--ink);
    padding:6px 4px;outline:none;transition:.2s;}
  .spell-input:focus{border-color:var(--teal);}
  .spell-input.right{border-color:var(--amber);color:var(--amber-deep);}
  .spell-input.wrong{border-color:var(--clay);color:var(--clay);}
  .spell-feedback{margin-top:13px;font-size:14px;min-height:20px;font-weight:600;}
  .spell-feedback .ok{color:var(--amber-deep);} .spell-feedback .no{color:var(--clay);}

  /* analyze (ssat) */
  .opts{display:flex;flex-direction:column;gap:9px;width:100%;max-width:330px;margin-top:6px;}
  .opt{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px;
    font-size:15px;cursor:pointer;transition:.15s;text-align:left;font-family:inherit;color:var(--ink);}
  .opt:active{background:var(--paper);}
  .opt.correct{border-color:var(--amber);background:rgba(201,138,43,.1);color:var(--amber-deep);font-weight:700;}
  .opt.wrong{border-color:var(--clay);background:rgba(178,90,68,.08);color:var(--clay);}

  .actions{display:flex;gap:10px;}
  .btn{flex:1;border:none;border-radius:14px;padding:15px 8px;font-size:15px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .btn small{font-size:10.5px;font-weight:500;opacity:.85;}
  .btn-no{background:#fff;color:var(--clay);border:1.5px solid var(--clay-soft);}
  .btn-yes{background:var(--amber);color:#fff;}
  .btn-flip{background:var(--ink);color:#fff;width:100%;border-radius:14px;border:none;
    padding:15px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--teal);color:#fff;}

  /* combo flash */
  .stage-wrap{position:relative;}
  .combo{position:absolute;top:8px;left:50%;transform:translateX(-50%) scale(.6);opacity:0;
    font-family:Georgia,serif;font-weight:700;font-size:26px;color:var(--amber);pointer-events:none;
    text-shadow:0 2px 12px rgba(201,138,43,.4);transition:.3s;z-index:5;}
  .combo.show{opacity:1;transform:translateX(-50%) scale(1);}

  .done{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
    padding:36px 24px;text-align:center;min-height:300px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:13px;}
  .done h2{font-family:Georgia,serif;font-size:25px;margin:0;color:var(--ink);}
  .done p{margin:0;color:var(--ink-soft);font-size:13.5px;line-height:1.6;max-width:300px;}
  .stat-row{display:flex;gap:24px;margin:4px 0;}
  .stat{display:flex;flex-direction:column;}
  .stat .n{font-family:Georgia,serif;font-size:30px;font-weight:700;}
  .stat .n.amber{color:var(--amber-deep);} .stat .n.clay{color:var(--clay);} .stat .n.teal{color:var(--teal);}
  .stat .l{font-size:11px;color:var(--ink-soft);letter-spacing:.4px;}

  .foot{font-size:11px;color:#a99f8c;text-align:center;line-height:1.6;padding:0 6px;}
  .foot b{color:var(--ink-soft);font-weight:600;}
  .voice-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:9px;
    font-size:12px;color:var(--ink-soft);}
  .voice-row select{font-family:inherit;font-size:12px;color:var(--ink);background:var(--card);
    border:1px solid var(--line);border-radius:8px;padding:5px 8px;max-width:230px;}
  .voice-tip{margin-top:8px;font-size:10.5px;color:#b3aa97;line-height:1.5;}
  .setn{background:transparent;border:none;color:var(--ink-soft);font-size:11.5px;text-decoration:underline;
    cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo display">词卡<span class="dot">.</span></div>
    <div class="gamebar">
      <div class="pill streak"><span class="ic">🔥</span><span id="streakN">0</span></div>
      <div class="pill xp"><span class="ic">★</span><span id="xpN">0</span></div>
      <button class="tbtn" onclick="openModal('stats')" title="统计">📊</button>
      <button class="tbtn" onclick="openModal('star')" title="难词本">⭐</button>
      <button class="tbtn" onclick="openModal('settings')" title="设置">⚙️</button>
    </div>
  </header>

  <div class="panel">
    <div class="ctl-row">
      <span class="ctl-label">范围</span>
      <div class="seg teal" id="segTier">
        <button data-tier="toefl" class="on">托福</button>
        <button data-tier="ssat">SSAT</button>
      </div>
    </div>
    <div class="ctl-row">
      <span class="ctl-label">任务</span>
      <div class="seg clay" id="segTask">
        <button data-task="learn" class="on">学新词</button>
        <button data-task="review">复习</button>
      </div>
    </div>
    <div class="adv-row">
      <button class="adv-toggle" onclick="toggleAdv()">进阶：手动选练法 ▾</button>
      <div class="seg adv-seg" id="segMode" style="display:none"></div>
    </div>
    <div class="due-line" id="dueLine"></div>
    <div class="goal2">
      <div class="goal-item">
        <span class="gl gl-new">新词</span>
        <div class="bar"><i id="goalFillNew"></i></div>
        <span class="num"><span id="goalCurNew">0</span>/<span id="goalTotNew">30</span></span>
      </div>
      <div class="goal-item">
        <span class="gl gl-rev">复习</span>
        <div class="bar"><i id="goalFillRev"></i></div>
        <span class="num"><span id="goalCurRev">0</span>/<span id="goalTotRev">0</span></span>
      </div>
    </div>
  </div>

  <div class="stage-wrap">
    <div class="combo" id="combo"></div>
    <div class="stage" id="stage"></div>
  </div>
  <div id="actionArea"></div>

  <div class="foot">
    <div class="voice-row">
      <span>🔊 语音</span>
      <select id="voiceSel" onchange="changeVoice(this.value)"></select>
    </div>
    <button class="setn" onclick="resetAll()">重置进度</button>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
/* ====== 词库（v2: {w:[...], fam:{...}}）======

function freqRank(w){ const p=SSAT_PRIORITY[(w.en||'').toLowerCase()]; return p===undefined?1e6:p; }
// 近义 token：词本身 + 它的近义词，用于“同一近义组一天只放一个新词”
function synTokens(w){
  const t=[(w.en||'').toLowerCase()];
  if(w.syn) (''+w.syn).split(',').forEach(s=>{ s=s.trim().toLowerCase(); if(s) t.push(s); });
  return t;
}

const KEY='cika_state_v1';

function load(){
  try{const j=JSON.parse(localStorage.getItem(KEY));if(j){
    if(j.doneT===undefined){j.doneT=0;j.doneS=0;j.goalT=30;j.goalS=30;}
    if(j.srs===undefined){ j.srs={};
      if(j.known) for(const w in j.known){ j.srs[w]={lvl:1,due:0}; }
    }
    if(j.known===undefined) j.known={};
    if(j.revT===undefined){ j.revT=0; j.revS=0; }
    if(j.cap===undefined) j.cap=30;        // 每日复习上限（可调）
    if(j.star===undefined) j.star={};      // 难词收藏
    return j;
  }}catch(e){}
  return {xp:0, streak:0, lastDay:null, goalT:30, goalS:30, doneT:0, doneS:0, revT:0, revS:0, cap:30, known:{}, srs:{}, star:{}};
}

function REVIEW_CAP(){ return S.cap||30; }  // 每日复习上限（每 tier），可在设置里改
// 用"距某固定起点的天数"作为日期，便于比较
const EPOCH=new Date(2026,0,1).getTime();
function dayNum(){ return Math.floor((Date.now()-EPOCH)/86400000); }
function today(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function rollDay(){
  const t=today();
  if(S.lastDay!==t){
    if(S.lastDay){
      const diff=(new Date(t)-new Date(S.lastDay))/86400000;
      S.streak = diff===1 ? S.streak+1 : (diff>1?1:S.streak);
    }else S.streak=1;
    S.lastDay=t; S.doneT=0; S.doneS=0; S.revT=0; S.revS=0; save();
  }
}
rollDay();

/* ====== 间隔复习（spaced repetition）核心 ====== */
const INTERVALS=[1,2,4,7,15,30,60];  // 各等级答对后的下次间隔（天）
function isKnown(en){ return !!S.srs[en]; }          // 背过（进入复习系统）
function isDue(en){ const r=S.srs[en]; return r && r.due<=dayNum(); }  // 今天该复习
// 答对：等级+1，按间隔安排下次
function srsPass(en){
  const r=S.srs[en]||{lvl:0,due:0};
  r.lvl=Math.min(r.lvl+1, INTERVALS.length);
  r.due=dayNum()+INTERVALS[r.lvl-1];
  r.fails=0; r.leech=false;     // 答对：清零连错计数，解除难词标记
  S.srs[en]=r; S.known[en]=1;
}
// 答错：等级清零；连续答错越多，下次间隔越长，避免难词每天无限循环折磨
function srsFail(en){
  const prev=S.srs[en]||{};
  const fails=(prev.fails||0)+1;
  const backoff = fails>=5 ? 7 : (fails>=3 ? 3 : 1);   // 连错≥3→搁3天，≥5→搁7天
  const leech = fails>=3;
  S.srs[en]={lvl:0, due:dayNum()+backoff, fails, leech};
  if(leech) S.star[en]=1;     // 难词自动收进 ⭐ 列表，单独处理
}
// 当前范围内今天该复习的词数
function dueCount(){ return pool().filter(w=>isDue(w.en)).length; }

/* ====== 模式定义（托福 vs SSAT 两种练法）====== */
const TOEFL_MODES=[{k:'en2zh',t:'英→中'},{k:'spell',t:'拼写'},{k:'dictation',t:'听写'}];
const SSAT_MODES =[{k:'recall',t:'回忆'},{k:'analyze',t:'近义辨析'}];
// 复习时随机从这些考法里挑（学新词时用第一个：翻卡）
const TOEFL_REVIEW=['en2zh','spell','dictation'];
const SSAT_REVIEW =['recall','analyze'];
const LEARN_MODE={toefl:'en2zh', ssat:'recall'};

// 给当前要显示的词决定用哪种考法
function pickMode(w){
  if(manualMode) return manualMode;                 // 手动选了练法：固定用它
  if(task==='learn') return LEARN_MODE[tier];       // 学新词：翻卡
  // 复习：还不熟的词（等级低）只用翻卡；记得比较牢的词才随机出辨析/听写
  const lvl = (S.srs[w.en] && S.srs[w.en].lvl) || 0;
  if(lvl < 2) return LEARN_MODE[tier];              // 等级<2（刚学/刚答错）只翻卡
  const poolM = tier==='toefl'?TOEFL_REVIEW:SSAT_REVIEW;
  let cand=poolM.slice();
  if(tier==='ssat'){ cand = w.syn ? cand : ['recall']; }  // 没近义词的只能回忆
  return cand[Math.floor(Math.random()*cand.length)];
}

function renderModeSeg(){
  const modes = tier==='ssat'?SSAT_MODES:TOEFL_MODES;

}

/* ====== 语音：优先选设备上最自然的英语语音 ====== */
let VOICES=[], chosenVoice=null;
const VOICE_KEY='cika_voice_v1';
// 已知较自然的语音名（各平台），按优先级
const GOOD_VOICES=[
  'Samantha','Ava','Allison','Susan','Karen','Serena','Moira','Tessa',  // Apple enhanced
  'Google US English','Google UK English Female','Microsoft Aria','Microsoft Jenny',
  'Microsoft Zira','Daniel','Catherine','Fiona'
];
function pickBestVoice(){
  VOICES=window.speechSynthesis.getVoices().filter(v=>/^en(-|_)/i.test(v.lang));
  // 1) 用户保存过的
  const saved=localStorage.getItem(VOICE_KEY);
  if(saved){ const m=VOICES.find(v=>v.name===saved); if(m){chosenVoice=m;return;} }
  // 2) 偏好"增强/premium/natural"关键字
  let enh=VOICES.find(v=>/enhanced|premium|natural/i.test(v.name));
  if(enh){chosenVoice=enh;return;}
  // 3) 已知好语音名
  for(const g of GOOD_VOICES){ const m=VOICES.find(v=>v.name.includes(g)); if(m){chosenVoice=m;return;} }
  // 4) 退而求其次：本地(非网络)优先、美音优先
  chosenVoice = VOICES.find(v=>v.localService&&/en-US/i.test(v.lang)) || VOICES.find(v=>/en-US/i.test(v.lang)) || VOICES[0] || null;
}
if('speechSynthesis' in window){
  pickBestVoice();
  window.speechSynthesis.onvoiceschanged=()=>{ pickBestVoice(); buildVoiceMenu(); };
}
function speak(text,opts={}){
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(chosenVoice){ u.voice=chosenVoice; u.lang=chosenVoice.lang; } else u.lang='en-US';
    u.rate=opts.rate||0.9; u.pitch=1.0;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
window.speak=speak;
function buildVoiceMenu(){
  const sel=document.getElementById('voiceSel'); if(!sel) return;
  sel.innerHTML='';
  VOICES.forEach(v=>{
    const o=document.createElement('option');
    o.value=v.name; o.textContent=v.name.replace(/Microsoft |Google /,'')+(/enhanced|premium|natural/i.test(v.name)?' ✦':'');
    if(chosenVoice&&v.name===chosenVoice.name)o.selected=true;
    sel.appendChild(o);
  });
}
window.changeVoice=function(name){
  const m=VOICES.find(v=>v.name===name); if(m){chosenVoice=m; try{localStorage.setItem(VOICE_KEY,name);}catch(e){} speak('This is the new voice.');}
};

// 缓存各 (tier+task) 的队列与进度，切走再回来能接着原处
let queueCache={};
function cacheKey(){ return tier+'|'+task+'|'+(manualMode||''); }

function buildQueue(opts){
  opts=opts||{};
  const key=cacheKey();
  // 切回来时：如果有未做完的缓存队列，接着用（修复"切走再回来重排"问题）
  if(!opts.fresh && queueCache[key] && queueCache[key].queue.length>0 && queueCache[key].idx < queueCache[key].queue.length){
    queue=queueCache[key].queue; idx=queueCache[key].idx;
    session=queueCache[key].session||{known:0,review:0};
    flipped=false; combo=0; render(); return;
  }

  const P=pool();
  let idxs=P.map((_,i)=>i);
  const goal = tier==='ssat'?S.goalS:S.goalT;
  const doneNew = tier==='ssat'?S.doneS:S.doneT;
  const doneRev = tier==='ssat'?S.revS:S.revT;
  const newRoom = Math.max(goal-doneNew, 0);
  const revRoom = Math.max(REVIEW_CAP()-doneRev, 0);

  let dueIdx=idxs.filter(i=>isDue(P[i].en));
  let newIdx=idxs.filter(i=>!isKnown(P[i].en));
  let restIdx=idxs.filter(i=>isKnown(P[i].en)&&!isDue(P[i].en));
  shuffle(dueIdx); shuffle(restIdx);
  if(tier==='ssat'){
    // 高频/高价值先学；同价位按词库原顺序，不再随机（避免生僻词乱跳到最前面）
    newIdx.sort((a,b)=> (freqRank(P[a])-freqRank(P[b])) || (a-b));
  } else {
    shuffle(newIdx);
  }

  if(manualMode){
    let ordered=dueIdx.slice(0,revRoom||dueIdx.length).concat(restIdx);
    if(ordered.length<Math.max(goal,20)) ordered=ordered.concat(newIdx);
    queue=ordered.slice(0,Math.max(goal,20));
  }else if(task==='review'){
    // 复习：只出今天到期的词（封顶 revRoom）；考法在 render 时随机
    queue=dueIdx.slice(0,revRoom);
    if(queue.length===0 && restIdx.length){ // 今天没到期的，允许提前复习一点
      queue=restIdx.slice(0,Math.min(20,Math.max(goal,20)));
    }
  }else{
    // 学新词：只出"今天还能学的新词"（额度用完=空队列→提示今日已完成，不再推新词）
    if(newRoom<=0){ queue=[]; }
    else if(tier==='ssat'){
      // 同一近义组一天只放一个：先把一个记牢，过两天再放它的近义词，避免互相糊掉
      const picked=[], deferred=[], seen=new Set();
      for(const i of newIdx){
        if(picked.length>=newRoom) break;
        const toks=synTokens(P[i]);
        if(toks.some(t=>seen.has(t))){ deferred.push(i); continue; }
        toks.forEach(t=>seen.add(t)); picked.push(i);
      }
      // 非冲突的不够填满额度时，用被推迟的补齐（极端情况）
      queue = picked.concat(deferred).slice(0,newRoom);
    } else {
      queue = newIdx.slice(0,newRoom);
    }
  }
  idx=0; flipped=false; session={known:0,review:0}; combo=0;
  queueCache[key]={queue,idx,session};
  render();
}
function saveQueueState(){ const key=cacheKey(); if(queueCache[key]){ queueCache[key].idx=idx; queueCache[key].session=session; } }
function advance(){ idx++; saveQueueState(); render(); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }
function curWord(){ return pool()[queue[idx]]; }
// 当前 tier 今天还需复习的词数（受上限约束）
function dueTodayCapped(){
  const doneRev = tier==='ssat'?S.revS:S.revT;
  const raw=pool().filter(w=>isDue(w.en)).length;
  return Math.min(raw, Math.max(REVIEW_CAP()-doneRev,0));
}

function updHud(){
  $("#xpN").textContent=S.xp;
  $("#streakN").textContent=S.streak;
  const isS = tier==='ssat';
  const goalNew = isS?S.goalS:S.goalT;
  const doneNew = isS?S.doneS:S.doneT;
  const doneRev = isS?S.revS:S.revT;
  // 今日复习目标 = 已复习 + 还到期的（受上限），即今天总共要复习多少
  const stillDue = pool().filter(w=>isDue(w.en)).length;
  const totRev = Math.min(doneRev+stillDue, REVIEW_CAP());
  $("#goalCurNew").textContent=doneNew; $("#goalTotNew").textContent=goalNew;
  $("#goalFillNew").style.width=Math.min(100,doneNew/goalNew*100)+"%";
  $("#goalCurRev").textContent=doneRev; $("#goalTotRev").textContent=totRev;
  $("#goalFillRev").style.width=(totRev>0?Math.min(100,doneRev/totRev*100):0)+"%";
  const dl=$("#dueLine");
  if(dl){
    dl.innerHTML = stillDue>0
      ? `📑 ${isS?'SSAT':'托福'} 今日待复习 <b>${Math.min(stillDue,Math.max(REVIEW_CAP()-doneRev,0))}</b> 个 · 新学 <b>${Math.max(goalNew-doneNew,0)}</b> 个`
      : `<span class="z">${isS?'SSAT':'托福'} 复习已清空 ✓ 新学还差 ${Math.max(goalNew-doneNew,0)} 个</span>`;
  }
}

  }
}
function awardKnown(wasReview){
  let pts=10; combo++;
  if(combo>=3){pts+=5*Math.min(combo-2,5); flashCombo(combo);}
  S.xp+=pts; session.known++; bumpDone(wasReview);
  save(); updHud();
}
function awardMiss(){ combo=0; session.review++; if(task!=='learn'){ queue.push(queue[idx]); } }

function flashCombo(n,txt){
  const c=$("#combo"); c.textContent = txt || ('连对 '+n+' ×');
  c.classList.add('show'); setTimeout(()=>c.classList.remove('show'),700);
}

/* ====== 渲染分发 ====== */
function render(){
  updHud();
  if(idx>=queue.length){ renderDone(); return; }
  const w=curWord();
  mode=pickMode(w);   // 复习时随机考法；学新词时翻卡；手动时固定
  if(mode==='spell'){ renderSpell(w); return; }
  if(mode==='dictation'){ renderDictation(w); return; }
  if(mode==='analyze'){ renderAnalyze(w); return; }
  renderCard(w);
}

/* 翻卡模式：托福 en2zh/zh2en，SSAT recall */
function renderCard(w){
  flipped=false;
  let front,back,hint,autoSpeak=null;
  if(mode==='en2zh'){
    front=`<div class="word">${w.en}</div><div class="phon">${w.phon?'['+w.phon+']':''}</div>`;
    back=`<div class="answer-zh">${w.zh}</div>${metaBlock(w)}${exBlock(w)}`;
    hint="点击看意思"; autoSpeak=w.en;
  }else if(mode==='zh2en'){
    front=`<div class="word-zh">${w.zh||w.def}</div>`;
    back=`<div class="answer-en">${w.en}</div><div class="phon">${w.phon?'['+w.phon+']':''}</div>${metaBlock(w)}${exBlock(w)}`;
    hint="想出英文词，点击核对";
  }else{ // ssat recall
    const lc = S.srs[w.en] && S.srs[w.en].leech;
    const frontHint = (lc && w.root) ? `<div style="margin-top:10px;font-size:13px;color:#B5651D">难词提示 · 词根 ${w.root}</div>` : '';
    front=`<div class="word">${w.en}</div>${frontHint}`;
    back=`<div class="def-en">${w.def}${spkInline(w.def,'def-spk')}</div>${metaBlock(w)}${exBlock(w)}`;
    hint= lc ? "难词——先看提示再回忆，点击看释义" : "点击看释义"; autoSpeak=w.en;
  }
  const tag = isKnown(w.en) ? '<span class="rv-chip rv-old">复习</span>' : '<span class="rv-chip rv-new">新词</span>';
  stage.innerHTML=`
    <div class="card" id="card" onclick="flip()">
      <div class="face front">${tierChip(w)}<span class="pos">${w.pos||''}</span>${tag}
        ${mode!=='zh2en'?spkBtn(w.en):''}${front}<div class="hint">${hint}</div></div>
      <div class="face back">${tierChip(w)}<span class="pos">${w.pos||''}</span>
        ${spkBtn(w.en)}${back}<button class="card-star${S.star[w.en]?' on':''}" id="cardStar" onclick="event.stopPropagation();toggleStar('${esc(w.en)}',this)">${S.star[w.en]?'⭐':'☆'}</button><div class="hint">记得牢吗？</div></div>
    </div>`;
  actionArea.innerHTML=`<button class="btn-flip" onclick="flip()">翻面看答案</button>`;
  if(autoSpeak) speak(autoSpeak);
}
function metaBlock(w){
  let h='';
  if(w.root) h+=`<div class="row"><span class="lab lab-root">词根</span>${w.root}</div>`;
  if(w.syn)  h+=`<div class="row"><span class="lab lab-syn">近义</span>${w.syn}</div>`;
  if(w.ant)  h+=`<div class="row"><span class="lab lab-ant">反义</span>${w.ant}</div>`;
  if(!h) return '';
  const cls = (w.tier==='ssat') ? 'meta meta-ssat' : 'meta';
  return `<div class="${cls}">${h}</div>`;
}
function exBlock(w){
  if(!w.ex) return '';
  // 高亮例句中的目标词（含简单词形变化）
  let s=w.ex;
  const base=w.en.replace(/[^a-zA-Z]/g,'');
  if(base.length>2){
    const re=new RegExp('\\b('+base+'(?:s|es|ed|d|ing|ly|er)?)\\b','gi');
    s=s.replace(re,'<mark>$1</mark>');
  }
  return `<div class="ex"><span class="ex-q">例</span>${s}${spkInline(w.ex,'spk-mini')}</div>`;
}
function spkInline(text,cls){return `<button class="${cls}" onclick="event.stopPropagation();speak('${esc(text)}')">🔊</button>`;}
function spkBtnInline(text){return spkInline(text,'def-spk');}

function flip(){
  const card=$("#card"); if(!card) return;

}
function mark(known){
  const w=curWord(); const wasReview=isKnown(w.en);
  if(known){ srsPass(w.en); awardKnown(wasReview); } else { srsFail(w.en); awardMiss(); }
  advance();
}

/* 听写模式（仅托福）：听发音→拼出英文（练听力+拼写）*/

/* SSAT 辨析模式：给词，选最贴切的近义词 */
let analyzeDone=false;
function renderAnalyze(w){
  // 正确答案：该词的一个近义词
  const realSyn = (w.syn||'').split(',')[0].trim();
  if(!realSyn){ advance(); return; }
  // 干扰项：优先选"词性相同"的词，且不能是本词的近义/反义词（否则也算对，混淆）
  const ownSyn=new Set((w.syn||'').split(',').map(s=>s.trim().toLowerCase()));
  const ownAnt=new Set((w.ant||'').split(',').map(s=>s.trim().toLowerCase()));
  const samePos=WORDS.filter(x=>x.tier==='ssat'&&x.pos===w.pos&&x.en!==w.en
      && !ownSyn.has(x.en.toLowerCase()) && !ownAnt.has(x.en.toLowerCase()));
  const fallback=WORDS.filter(x=>x.tier==='ssat'&&x.en!==w.en);
  const src = samePos.length>=3 ? samePos : fallback;
  let distract=[];
  let guard=0;
  while(distract.length<3 && guard++<200){
    const cand=src[Math.floor(Math.random()*src.length)].en;
    if(cand!==realSyn && !distract.includes(cand) && !ownSyn.has(cand.toLowerCase())) distract.push(cand);
  }
  let opts=[realSyn,...distract];
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  const tag = isKnown(w.en) ? '<span class="rv-chip rv-old">复习</span>' : '<span class="rv-chip rv-new">新词</span>';
  stage.innerHTML=`<div class="card"><div class="face front" style="justify-content:flex-start;padding-top:30px">
    ${tierChip(w)}<span class="pos">${w.pos||''}</span>${tag}${spkBtn(w.en)}
    <div class="word" style="font-size:30px">${w.en}</div>
    <div class="phon" style="margin-bottom:6px">选出最接近的近义词</div>
    <div class="opts" id="opts">${opts.map(o=>`<button class="opt" onclick="pickSyn(this,'${esc(o)}','${esc(realSyn)}')">${o}</button>`).join('')}</div>
  </div></div>`;
  actionArea.innerHTML=`<button class="btn-flip" id="anBtn" onclick="nextAnalyze()" style="opacity:.5;pointer-events:none">选一个</button>`;
  analyzeDone=false; speak(w.en);
}
function pickSyn(el,chosen,correct){
  if(analyzeDone) return; analyzeDone=true;
  const w=curWord(); const wasReview=isKnown(w.en);
  [...document.querySelectorAll('.opt')].forEach(b=>{
    if(b.textContent===correct) b.classList.add('correct');
    if(b===el && chosen!==correct) b.classList.add('wrong');
    b.style.pointerEvents='none';
  });
  if(chosen===correct){ srsPass(w.en); awardKnown(wasReview); }
  else { srsFail(w.en); awardMiss(); }
  const btn=$("#anBtn"); btn.textContent='下一个'; btn.style.opacity='1'; btn.style.pointerEvents='auto';
}
function nextAnalyze(){ advance(); }

/* SSAT 反义模式：给词+释义，回忆它的反义词（多角度复习的一个入口）*/
function renderDone(){
  let msg, title;
  if(queue.length===0){
    // 一开始就没词可练
    if(task==='review'){ title='今天没有要复习的'; msg='复习是背过的词到期才出现的。先去“学新词”，过几天它们就会回来让你复习。'; }
    else { const goal=tier==='ssat'?S.goalS:S.goalT; title='今日新词已学完'; msg=`今天的 ${goal} 个新词已经学完啦 👏 去“复习”巩固一下，或明天再来。`; }
  }else{
    title='这一轮完成啦';
    msg = task==='review'
      ? `复习完成！“还不熟”的词会按遗忘曲线再回来。已坚持 <b>${S.streak}</b> 天 🔥`
      : `这批新词学完了。记得去“复习”里巩固——复习会用不同方式考你，记得更牢。已坚持 <b>${S.streak}</b> 天 🔥`;
  }
  stage.innerHTML=`<div class="done">
    <h2>${title}</h2>
    ${queue.length>0?`<div class="stat-row">
      <div class="stat"><span class="n amber">${session.known}</span><span class="l">答对</span></div>
      <div class="stat"><span class="n clay">${session.review}</span><span class="l">要再练</span></div>
      <div class="stat"><span class="n teal">+${session.known*10}</span><span class="l">本轮 ★</span></div>
    </div>`:''}
    <p>${msg}</p>
  </div>`;
  // 完成后的按钮：额度已满（空队列）不再给"再来一轮"，只引导去另一任务
  const other = task==='review'?'learn':'review';
  const otherT = other==='review'?'去复习巩固':'去学新词';
  if(queue.length===0){
    actionArea.innerHTML=`<button class="btn-flip btn-primary" onclick="switchTask('${other}')">${otherT}</button>`;
  }else{
    actionArea.innerHTML=`<div class="actions">
      <button class="btn-flip" style="flex:1;background:var(--card);color:var(--ink);border:1.5px solid var(--line)" onclick="buildQueue({fresh:true})">再来一轮</button>
      <button class="btn-flip btn-primary" style="flex:1" onclick="switchTask('${other}')">${otherT}</button>
    </div>`;
  }
}

  buildQueue();
}

    </div>`).join('') : '<div class="mhint" style="padding:20px 0;text-align:center">还没有收藏的难词。背词时点卡片右下角的 ☆ 收藏，集中攻克。</div>';
  return `<h3>难词本 <button class="x" onclick="closeModal()">×</button></h3>
    <div class="mhint" style="margin-bottom:10px">${list.length} 个收藏词。点 ⭐ 移除。</div>
    <div class="starlist">${inner}</div>`;
}
window.toggleStar=function(en,el){
  if(S.star[en]){ delete S.star[en]; } else { S.star[en]=1; }
  save();
  if(el && el.classList.contains('star-item') || (el&&el.closest&&el.closest('.star-item'))){
    if(!S.star[en]){ const it=el.closest('.star-item'); if(it) it.remove(); }
  }
  const cs=document.getElementById('cardStar');
  if(cs){ const on=!!S.star[curWord().en]; cs.classList.toggle('on',on); cs.textContent=on?'⭐':'☆'; }
};

renderModeSeg(); buildQueue(); updHud(); buildVoiceMenu();
// voices sometimes load async
setTimeout(()=>{ if(window.speechSynthesis){ pickBestVoice(); buildVoiceMenu(); } },500);
</script>
</body>
